services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: swingtradev3-app
    ports:
      - "8001:8000"
    volumes:
      - ./swingtradev3:/app
      - ./swingtradev3/context:/app/context
      - ./swingtradev3/logs:/app/logs
      - ./swingtradev3/strategy:/app/strategy
    env_file:
      - swingtradev3/.env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Kolkata
    depends_on:
      - kite-mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Override CMD for dev: hot reload for FastAPI
    command: >
      sh -c "
        uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
      "

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: swingtradev3-dashboard
    ports:
      - "8502:3000"
      - "8002:8000"
    env_file:
      - swingtradev3/.env
    environment:
      - FASTAPI_URL=http://app:8000
      - TZ=Asia/Kolkata
      - API_KEY=${FASTAPI_API_KEY}
    volumes:
      - ./swingtradev3/dashboard:/app
    depends_on:
      - app
    restart: unless-stopped

  kite-mcp:
    build:
      context: .
      dockerfile: Dockerfile.kite-mcp
    container_name: swingtradev3-kite-mcp
    ports:
      - "8081:8080"
    env_file:
      - swingtradev3/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
