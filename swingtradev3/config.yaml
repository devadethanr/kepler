trading:
  mode: paper
  capital_inr: 20000
  exchange: NSE
  universe: nifty200
  max_positions: 3
  min_cash_reserve_pct: 0.20

research:
  scan_start_time: "15:45"
  briefing_time: "08:45"
  min_score_threshold: 7.0
  max_shortlist: 7
  max_same_sector_positions: 2
  exclude_earnings_within_days: 7
  exclude_corporate_actions_within_days: 5
  async_scan: true
  quick_filter:
    min_market_cap_cr: 5000
    min_avg_volume: 500000
    max_promoter_pledge_pct: 30.0
    below_200ema_disqualify: true
  analyst_loop:
    enabled: true
    cadence: monthly
    day_of_month: 1
    time: "18:00"
    min_trades_required: 8
  quarterly_audit:
    enabled: true
    min_trades_required: 20
  filter:
    min_priority_signals: 1
    batch_size: 10
    news_sweep_query: "Indian stock market today Nifty 200 news"
    options_pcr_threshold: 1.2
    options_oi_spike_pct: 20
    trend_filter_ema: 200
    min_volume_ratio: 1.0
    max_pledging_pct: 25
    min_delivery_pct: 50

execution:
  poll_interval_minutes: 30
  approval_timeout_hours: 16
  trail_stop_at_pct: 5.0
  trail_to_pct: 10.0
  trail_stop_to_locked_profit_pct: 5.0
  enable_trailing: true
  avoid_fno_expiry_days: 2
  max_entry_deviation_pct: 3.0
  corporate_action_handling:
    dividend_adjust_stop: true
    alert_days_before_exdate: 5
    auto_adjust_timeout_hours: 12
    bonus_split_pause_entries: true

risk:
  max_risk_pct_per_trade: 0.015
  max_weekly_loss_pct: 0.04
  max_drawdown_pct: 0.10
  min_rr_ratio: 2.0
  confidence_sizing:
    high:
      min_score: 8.0
      capital_pct: 0.40
    medium:
      min_score: 7.0
      capital_pct: 0.25

indicators:
  timeframe: daily
  candle_buffer_size: 250
  weekly_candle_buffer: 104
  momentum:
    rsi_length: 14
    rsi_overbought: 70
    rsi_oversold: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    stoch_k: 14
    stoch_d: 3
    roc_length: 10
  trend:
    ema_fast: 21
    ema_mid: 50
    ema_slow: 200
    adx_length: 14
    adx_trend_threshold: 25
    supertrend_length: 10
    supertrend_multiplier: 3.0
  volatility:
    atr_length: 14
    atr_stop_multiplier: 1.5
    bb_length: 20
    bb_std: 2.0
    bb_squeeze_threshold: 0.02
  volume:
    volume_avg_periods: 20
    volume_spike_multiplier: 2.0
    mfi_length: 14
  structure:
    pivot_type: weekly
    sr_lookback_periods: 20
    high_52w_proximity_alert_pct: 5.0
    base_consolidation_min_weeks: 4
    base_consolidation_max_weeks: 12
  relative_strength:
    periods: [20, 50, 90]
    benchmark: "NSE:NIFTY 50"
  patterns:
    min_strength: 60
    enabled:
      - doji
      - hammer
      - engulfing
      - morning_star
      - evening_star
      - shooting_star
      - three_white_soldiers

llm:
  timeout_seconds: 5.0
  max_tool_calls_per_stock: 8
  roles:
    research:
      provider: nim
      model: "meta/llama-3.1-70b-instruct"
      temperature: 0.15
      max_tokens: 4096
    execution:
      provider: nim
      model: "meta/llama-3.1-70b-instruct"
      temperature: 0.10
      max_tokens: 300
    analyst:
      provider: nim
      model: "meta/llama-3.1-70b-instruct"
      temperature: 0.20
      max_tokens: 2000
  fallback_chain:
    - provider: nim
      model: "stepfun-ai/step-3.5-flash"
    - provider: groq
      model: "llama-3.3-70b-versatile"
    - provider: gemini
      model: "gemini-2.0-flash"
    - provider: anthropic
      model: "claude-3-7-sonnet-latest"
  adk:
    root_model: "meta/llama-3.1-70b-instruct"
    research_model: "meta/llama-3.1-70b-instruct"
    execution_model: "meta/llama-3.1-70b-instruct"
    learning_model: "meta/llama-3.1-70b-instruct"
    judge_model: "meta/llama-3.1-70b-instruct"

learning:
  min_trades_for_lesson: 8
  min_trades_for_kelly: 20
  max_lessons_per_month: 3

schedule:
  auth_refresh: "08:50"
  market_open: "09:15"
  market_close: "15:30"
  research_start: "15:45"
  briefing_time: "08:45"
  timezone: "Asia/Kolkata"

notifications:
  telegram:
    enabled: true
    require_entry_approval: true
    alert_on_levels: [warning, critical]
    daily_summary: true
    daily_summary_time: "16:00"

backtest:
  use_llm: false
  start_date: "2023-01-01"
  end_date: "2025-12-31"
  initial_capital: 20000
  fee_model: delivery
  fill_price: next_open
  slippage_pct: 0.001
  brokerage_per_order: 0.0
  cache_data: true
  cache_dir: ".backtest_cache"
  thresholds:
    min_win_rate: 0.45
    min_sharpe: 1.0
    max_drawdown: 0.15
    min_profit_factor: 1.3
    min_wfe_ratio: 0.5
    min_total_trades: 20
  walk_forward:
    enabled: true
    in_sample_months: 6
    out_sample_months: 2
    n_windows: 4
  optimizer:
    enabled: false
    n_trials: 100
    metric: sharpe
    search_space:
      indicators.momentum.rsi_length: [10, 21]
      indicators.volatility.atr_stop_multiplier: [1.0, 2.5]
      indicators.trend.adx_trend_threshold: [20, 30]
      risk.confidence_sizing.medium.capital_pct: [0.15, 0.35]

# ─────────────────────────────────────────────────────────────
# V2 ADDITIONS (ADK + FastAPI + Streamlit + 24-Hour Cycle)
# ─────────────────────────────────────────────────────────────

api:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["http://localhost:8501"]
  api_key_env: "FASTAPI_API_KEY"
  rate_limit:
    requests_per_minute: 60
    burst: 10

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8501
  refresh_interval_seconds: 30
  theme: "light"

scheduler:
  overnight:
    start_time: "22:00"
    end_time: "06:00"
    global_market_tracking_minutes: 120
    news_monitoring_minutes: 30
    macro_updates_hours: 4
    gift_nifty_minutes: 15
    gift_nifty_start: "05:00"
  morning:
    news_digest_time: "06:00"
    regime_check_time: "06:30"
    fii_dii_check_time: "07:00"
    earnings_check_time: "07:30"
    briefing_generation_time: "08:00"
    briefing_send_time: "08:30"
    approval_reminder_time: "08:45"
    premarket_setup_time: "09:00"
  market_hours:
    opening_range_end: "09:45"
    position_monitoring_minutes: 15
    gtt_health_check_minutes: 30
    intraday_news_minutes: 60
    entry_window_start: "10:30"
    mid_morning_regime_check: "11:00"
    lunch_volume_check_start: "12:00"
    lunch_volume_check_end: "13:00"
    afternoon_review: "13:00"
    late_day_news: "14:00"
    final_entry_window: "14:30"
    closing_prep: "15:00"
    market_close_actions: "15:30"
  post_market:
    eod_data_collection: "15:30"
    pnl_calculation: "15:45"
    fii_dii_final: "16:00"
    options_analysis: "16:15"
    corporate_action_check: "16:30"
    observation_logging: "17:00"
    state_snapshot: "17:30"
  evening_research:
    start_time: "18:00"
    signal_sweep_minutes: 15
    filtering_minutes: 15
    deep_analysis_minutes: 90
    scoring_minutes: 30
    briefing_send_time: "20:30"
    approval_window_open: "20:45"
  wind_down:
    final_news_scan: "21:00"
    state_persistence: "21:15"
    log_rotation: "21:30"
    health_check: "21:45"
    overnight_mode_start: "22:00"

data:
  kite_rate_limit_per_second: 3
  cache_ttl_minutes: 30
  parquet_cache_enabled: true
  parquet_cache_dir: ".backtest_cache"
  news_cache_ttl_minutes: 60
  fundamentals_cache_ttl_hours: 24
  macro_cache_ttl_hours: 4
